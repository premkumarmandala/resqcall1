<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQCall - Emergency Assistance</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://sdk.twilio.com/js/client/v1.14/twilio.min.js"></script>
    <style>
        :root {
            --primary: #FF4757;
            --secondary: #2F3542;
            --accent: #5352ED;
            --bg: #F1F2F6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #2F3542;
            --text-light: #F1F2F6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #747d8c, #ced6e0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            min-height: 800px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3);
        }

        .header h1 {
            margin: 0;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .header p {
            opacity: 0.9;
            margin-top: 5px;
            font-weight: 300;
        }

        .content {
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sos-btn {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #FF4757, #FF6B81);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2);
            cursor: pointer;
            align-self: center;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 71, 87, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
            }
        }

        .sos-btn:active {
            transform: scale(0.95);
        }

        .sos-btn small {
            font-size: 1rem;
            font-weight: 400;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* In-Call Interface */
        .call-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2c3e50, #000000);
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 4rem 2rem;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .call-interface.active {
            transform: translateY(0);
        }

        .caller-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .caller-avatar {
            width: 120px;
            height: 120px;
            background: #dfe6e9;
            border-radius: 50%;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #636e72;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .call-status {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .call-timer {
            font-size: 2.5rem;
            font-weight: 300;
            margin-top: 1rem;
            font-variant-numeric: tabular-nums;
            display: none;
        }

        .call-controls {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
        }

        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .call-btn:active {
            transform: scale(0.9);
        }

        .btn-mute {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-end {
            background: #ff4757;
            color: white;
            width: 80px;
            height: 80px;
        }

        .audio-wave {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 50px;
            margin-top: 2rem;
            transition: opacity 0.3s;
        }

        .wave-bar {
            width: 6px;
            background: #2ed573;
            border-radius: 10px;
            animation: wave 1s infinite ease-in-out;
        }

        @keyframes wave {

            0%,
            100% {
                height: 10px;
            }

            50% {
                height: 40px;
            }
        }

        /* --- Analysis UI --- */
        .status-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: none;
            color: var(--text-dark);
        }

        .status-card.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #ddd;
            font-family: inherit;
            resize: none;
            transition: border 0.3s;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(83, 82, 237, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(83, 82, 237, 0.4);
        }

        .analysis-result {
            margin-top: 1rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            display: inline-block;
        }

        .badge-Critical {
            background: #ff4757;
        }

        .badge-High {
            background: #ffa502;
        }

        .badge-Medium {
            background: #eccc68;
            color: black;
        }

        .badge-Low {
            background: #2ed573;
        }

        .hospital-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Main Home Screen -->
        <div id="main-view" style="display: flex; flex-direction: column; flex: 1;">
            <div class="header">
                <h1>ResQCall</h1>
                <p>24/7 Emergency Response</p>
            </div>

            <div class="content">
                <div style="text-align: center; margin-bottom: 1rem;">
                    <p style="color: #747d8c;">Tap immediately for emergency</p>
                </div>

                <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                    <button class="sos-btn" id="sos-button" onclick="startEmergency()">
                        <span>SOS</span>
                        <small>Call 9676097120</small>
                    </button>
                    <!-- Status message to warn about missing config -->
                    <div id="config-warning" style="display:none; color: red; margin-top: 10px; text-align: center;">
                    </div>
                </div>

                <div class="status-card" id="post-call-analysis" style="display: none;">
                    <div class="form-group">
                        <label>Describe Symptoms (Silent Analysis)</label>
                        <textarea id="symptoms-input" rows="3"
                            placeholder="I am feeling chest pain and dizziness..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="analyzeSymptoms()">Analyze & Find Help</button>
                    <div id="analysis-output" style="margin-top: 1rem;"></div>
                </div>

                <div style="margin-top: auto; text-align: center;">
                    <p id="location-status">📍 Locating you...</p>
                    <a href="user_dashboard.html" class="btn"
                        style="background:#5352ED; color:white; margin-top:10px; display:inline-block; text-decoration:none;">Go
                        to Dashboard</a>
                </div>
            </div>
        </div>

        <!-- In-Call Overlay -->
        <div id="call-interface" class="call-interface">
            <div class="caller-info">
                <div class="caller-avatar">👮‍♂️</div>
                <h2>Emergency Dispatch</h2>
                <h3 style="font-weight: 300;">9676097120</h3>
                <div class="call-status" id="call-status-text">Calling...</div>
                <div class="call-timer" id="call-timer">00:00</div>

                <div class="audio-wave" id="audio-wave" style="opacity: 0;">
                    <div class="wave-bar" style="animation-duration: 0.8s"></div>
                    <div class="wave-bar" style="animation-duration: 1.1s"></div>
                    <div class="wave-bar" style="animation-duration: 1.3s"></div>
                    <div class="wave-bar" style="animation-duration: 0.9s"></div>
                    <div class="wave-bar" style="animation-duration: 1.2s"></div>
                </div>

                <div id="live-precautions-container" style="display: none; margin-top: 2rem; background: rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; width: 90%; max-width: 400px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);">
                    <h4 style="margin: 0 0 10px; color: #f1c40f; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 600;">
                        <span>⚠️ Live AI Precaution</span>
                    </h4>
                    <p id="live-precautions-text" style="margin: 0; font-size: 1rem; line-height: 1.4; color: #f1f2f6; text-align: center;">Listening to your conversation...</p>
                </div>
            </div>

            <div class="call-controls">
                <button class="call-btn btn-mute" onclick="toggleMute()">
                    <span>❌</span> <!-- Using Emoji for icons -->
                </button>
                <button class="call-btn btn-end" onclick="endEmergencyCall()">
                    <span>📞</span>
                </button>
                <button class="call-btn btn-mute">
                    <span>🔊</span>
                </button>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script>
        let userLat = null;
        let userLng = null;
        let currentAnalysis = null;
        let callTimerInterval = null;
        let callSeconds = 0;
        let device = null;
        let connection = null;
        let isSimulationMode = false;
        let lastAnalyzedText = "";
        let liveAnalyzing = false;

        // Speech Recognition Setup
        let recognition = null;
        let transcribedText = "";
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                transcribedText = "";
                console.log("Speech recognition started.");
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        transcribedText += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                document.getElementById('symptoms-input').value = transcribedText + interimTranscript;
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
            };

            recognition.onend = function() {
                console.log("Speech recognition ended.");
            };
        }

        // Auto-detect location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    document.getElementById('location-status').innerText = `📍 Location: ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                },
                (err) => {
                    document.getElementById('location-status').innerText = "📍 Location access denied";
                }
            );
        }

        async function initTwilio() {
            try {
                // Get Capability Token
                const user = getUser();
                const res = await apiCall('/call/token', 'POST', { user_id: user.id || 'guest' });

                if (res && res.token) {
                    console.log('Twilio Token received');
                    device = new Twilio.Device(res.token, { debug: true, codecPreferences: ['opus', 'pcmu'] });

                    device.on('ready', function (device) {
                        console.log('Twilio.Device Ready!');
                    });

                    device.on('error', function (error) {
                        console.error('Twilio.Device Error: ' + error.message);
                        if (error.code === 31205) { // SSL/TLS error or similar
                            isSimulationMode = true;
                        }
                    });

                    device.on('connect', function (conn) {
                        console.log('Successfully established call!');
                        connection = conn;
                        updateCallUI('Connected');
                    });

                    device.on('disconnect', function (conn) {
                        console.log('Call ended.');
                        endEmergencyCallUI();
                    });
                } else {
                    console.warn('Could not get Twilio token - Falling back to Simulation Mode');
                    isSimulationMode = true;
                }
            } catch (err) {
                console.error("Failed to init Twilio", err);
                isSimulationMode = true;
            }
        }

        // Initialize on load
        initTwilio();

        async function startEmergency() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            
            window.location.href = 'tel:9676097120';

            // Show Call Interface immediately
            const callUI = document.getElementById('call-interface');
            callUI.classList.add('active');
            document.getElementById('call-status-text').innerText = "Dialing...";

            // Start Live Voice Recording / NLP transcription
            if (recognition) {
                try { recognition.start(); } catch(e) { console.error('Error starting recognition', e); }
            }

            if (device && !isSimulationMode) {
                // Real Call Logic
                try {
                    const user = getUser();
                    // Pass user_id so backend can log it immediately
                    connection = device.connect({
                        params: {
                            To: '9676097120',
                            user_id: user.id
                        }
                    });
                } catch (err) {
                    console.error("Twilio connect error", err);
                    simulateCall();
                }
            } else {
                // Simulation Mode
                console.warn("Using Simulation Mode");
                simulateCall();
            }


        }

        function simulateCall() {
            setTimeout(() => {
                updateCallUI('Connected (Simulated)');
            }, 2000);
        }

        function updateCallUI(status) {
            document.getElementById('call-status-text').innerText = status;
            document.getElementById('call-timer').style.display = 'block';
            document.getElementById('audio-wave').style.opacity = '1';
            startTimer();
        }

        function startTimer() {
            callSeconds = 0;
            const timerDisplay = document.getElementById('call-timer');
            if (callTimerInterval) clearInterval(callTimerInterval);

            callTimerInterval = setInterval(async () => {
                callSeconds++;
                const mins = Math.floor(callSeconds / 60).toString().padStart(2, '0');
                const secs = (callSeconds % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;

                // Live NLP processing every 10 seconds
                if (callSeconds % 10 === 0 && !liveAnalyzing) {
                    const currentText = document.getElementById('symptoms-input').value.trim();
                    if (currentText.length > 10 && currentText !== lastAnalyzedText) {
                        liveAnalyzing = true;
                        lastAnalyzedText = currentText;
                        try {
                            const data = await apiCall('/ai/analyze', 'POST', {
                                symptoms: currentText,
                                latitude: userLat,
                                longitude: userLng
                            });
                            if (data && !data.error && data.analysis && data.analysis.advice) {
                                document.getElementById('live-precautions-container').style.display = 'block';
                                document.getElementById('live-precautions-text').innerText = data.analysis.advice;
                            }
                        } catch (e) {
                            console.error("Live analysis parsing err", e);
                        }
                        liveAnalyzing = false;
                    }
                }
            }, 1000);
        }

        function endEmergencyCall() {
            // Hangup real call
            if (connection) {
                connection.disconnect();
                connection = null;
            } else {
                // Just close UI if it was simulated or already closed
                endEmergencyCallUI();
            }
        }

        function endEmergencyCallUI() {
            clearInterval(callTimerInterval);

            // Log the simulated/external call
            if (isSimulationMode) {
                try {
                    const user = getUser();
                    if (user && user.id) {
                        apiCall('/call/log-external', 'POST', { 
                            user_id: user.id, 
                            duration: callSeconds,
                            status: 'completed'
                        });
                    }
                } catch(e) { console.error('Error logging call', e); }
            }

            // Hide Call UI
            const callUI = document.getElementById('call-interface');
            callUI.classList.remove('active');

            // Reset UI
            setTimeout(() => {
                document.getElementById('call-status-text').innerText = "Calling...";
                document.getElementById('call-timer').innerText = "00:00";
                document.getElementById('call-timer').style.display = 'none';
                document.getElementById('audio-wave').style.opacity = '0';
                document.getElementById('live-precautions-container').style.display = 'none';
                document.getElementById('live-precautions-text').innerText = "Listening to your conversation...";
                lastAnalyzedText = "";
            }, 500);

            // Show Post-Call Analysis (Symptoms)
            const postCall = document.getElementById('post-call-analysis');
            postCall.style.display = 'block';
            postCall.classList.add('active');

            // Scroll to it
            setTimeout(() => {
                postCall.scrollIntoView({ behavior: 'smooth' });
                
                // Stop Speech Recognition
                if (recognition) {
                    try { recognition.stop(); } catch(e) {}
                }

                // If speech was recorded during the call, auto-analyze
                if (document.getElementById('symptoms-input').value.trim().length > 0) {
                    analyzeSymptoms();
                }
            }, 300);
        }

        function toggleMute() {
            const btn = event.currentTarget;
            const isMuted = btn.style.opacity === '1';

            if (connection) {
                connection.mute(!isMuted); // Toggle real mute
            }

            btn.style.opacity = isMuted ? '0.5' : '1';
        }

        async function analyzeSymptoms() {
            const symptoms = document.getElementById('symptoms-input').value;
            const output = document.getElementById('analysis-output');

            if (!symptoms) {
                alert("Please enter symptoms");
                return;
            }

            output.innerHTML = '<p style="text-align:center;">Analyzing with AI...</p>';

            const payload = {
                symptoms: symptoms,
                latitude: userLat,
                longitude: userLng
            };

            const data = await apiCall('/ai/analyze', 'POST', payload);

            if (data && !data.error) {
                const analysis = data.analysis;
                const hospital = data.nearest_hospital;
                const dist = data.distance_km;

                // Store for ambulance request
                currentAnalysis = { analysis, hospital, dist };

                let html = `
                    <div class="analysis-result">
                        <h3>Analysis Result <span class="badge badge-${analysis.urgency}">${analysis.urgency}</span></h3>
                        <p><strong>Advice:</strong> ${analysis.advice}</p>
                        <p><strong>Speciality:</strong> ${analysis.speciality}</p>
                    </div>
                `;

                if (hospital) {
                    html += `
                        <div class="hospital-info">
                            <h4>🏥 Nearest Hospital Match</h4>
                            <p><strong>${hospital.name}</strong> (${dist} km away)</p>
                            <p>${hospital.address}</p>
                            <p>Phone: ${hospital.phone}</p>
                            <small style="color: green;">✓ SMS Sent with details</small>
                            <div style="margin-top: 10px;">
                                <a href="https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${hospital.latitude},${hospital.longitude}&travelmode=driving" 
                                   target="_blank" 
                                   class="btn btn-primary" 
                                   style="display: inline-block; text-decoration: none; text-align: center; padding: 10px; font-size: 0.9rem;">
                                   📍 Get Directions
                                </a>
                            </div>
                        </div>
                    `;

                    if (analysis.ambulance_needed) {
                        html += `
                            <div style="margin-top: 1rem; background: #ffeaa7; padding: 10px; border-radius: 10px;">
                                <strong>🚑 Ambulance Recommended</strong>
                                <p>System has flagged this as requiring transport.</p>
                                <button class="btn btn-primary" style="background:#2C3A47; margin-top:5px;" onclick="requestAmbulance()">Request Ambulance Now</button>
                            </div>
                        `;
                    }
                } else {
                    html += `<p style="color:red; margin-top:10px;">No nearby hospitals found!</p>`;
                }

                output.innerHTML = html;
            } else {
                output.innerHTML = `<p style="color:red;">Error: ${data ? data.message : 'Unknown error'}</p>`;
            }
        }

        async function requestAmbulance() {
            if (!currentAnalysis) return;

            const btn = event.target;
            btn.innerHTML = "Dispatching...";
            btn.disabled = true;

            // Create Emergency Record
            const payload = {
                patient_name: getUser().name || 'Unknown',
                contact_number: getUser().phone || 'Unknown',
                location_address: `Lat: ${userLat}, Lng: ${userLng}`,
                location_lat: userLat,
                location_lng: userLng,
                severity: currentAnalysis.analysis.urgency,
                emergency_type: currentAnalysis.analysis.speciality
            };

            const res = await apiCall('/emergencies/', 'POST', payload);

            if (res && !res.error) {
                alert("✅ Ambulance Dispatched! Traffic Police notified for green corridor.");
                btn.innerHTML = "Ambulance On The Way";
            } else {
                alert("Error dispatching: " + (res?.message || 'Unknown'));
                btn.innerHTML = "Retry Ambulance";
                btn.disabled = false;
            }
        }

    </script>
</body>

</html>
