<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Admin | Call Logs</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <!-- Injected by main.js -->
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Emergency Call History</h1>
                <p style="color: var(--text-secondary);">Recorded conversations with SOS line</p>
            </header>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Call ID</th>
                                <th>User ID</th>
                                <th>Start Time</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Recording</th>
                            </tr>
                        </thead>
                        <tbody id="callLogsTable">
                            <tr>
                                <td colspan="6" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuthRedirect();
            setupSidebar();

            // Highlight current page in sidebar if possible, or just load data
            await loadCallLogs();
        });

        async function loadCallLogs() {
            const tbody = document.getElementById('callLogsTable');
            try {
                const logs = await apiCall('/call/history', 'GET');
                tbody.innerHTML = '';

                if (logs && logs.length > 0) {
                    logs.forEach(log => {
                        const date = new Date(log.start_time).toLocaleString();
                        const duration = log.duration ? `${log.duration}s` : '-';

                        let player = '-';
                        if (log.recording_url) {
                            player = `<audio controls src="${log.recording_url}" style="height: 30px;"></audio>`;
                        }

                        const row = `
                            <tr>
                                <td>${log.call_sid.substring(0, 10)}...</td>
                                <td>${log.user_id || 'Guest'}</td>
                                <td>${date}</td>
                                <td>${duration}</td>
                                <td><span class="badge badge-${log.status === 'completed' ? 'success' : 'warn'}">${log.status}</span></td>
                                <td>${player}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No call history found.</td></tr>';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Failed to load logs.</td></tr>';
            }
        }
    </script>
    <style>
        .badge-success {
            background: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .badge-warn {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }
    </style>
</body>

</html>
